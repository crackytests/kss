<body>
  <header id="hud"></header>
  <!-- Sprint 2 mount slots. Each is fully owned by its workstream (content +
       visibility). Lead exposes them empty so no WS rewrites another's UI file. -->
  <div id="sponsorSlot"></div>   <!-- WS-G: sponsor demands bar -->
  <div id="tickerSlot"></div>    <!-- WS-N: satirical news ticker -->

  <main id="app">
    <section id="browse" class="pane" aria-label="Live directory"></section>
    <section id="frontpage" class="pane" aria-label="Front page"></section>
    <section id="discord" class="pane" aria-label="Discord DMs"></section>
  </main>

  <div id="toasts" aria-live="polite"></div>
  <div id="shiftOverlay" class="shift-overlay" hidden></div>
  <div id="shopSlot"></div>          <!-- WS-E: perks shop (shown between shifts) -->
  <div id="leaderboardSlot"></div>   <!-- WS-I: leaderboard / career screen -->
  <div id="tutorial" hidden></div>   <!-- WS-L: first-run tutorial steps -->
  <div id="titleScreen" hidden></div><!-- WS-L: title screen (topmost shell) -->
  <div id="settingsHost"></div>      <!-- WS-L: settings panel; own host so it works in-game too -->
  <div id="endingSlot"></div>        <!-- WS-N: run-ending story card (topmost of game overlays) -->
  <div id="crisisSlot"></div>        <!-- WS-P: PR crisis panel -->
  <div id="clipSlot"></div>          <!-- WS-P: clip desk button + timing bar -->

  <script type="module" src="src/main.js?v=10"></script>
</body>
